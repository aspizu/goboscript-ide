name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    goboscript-wasm:
        name: Build Goboscript WASM
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Goboscript Repository
              uses: actions/checkout@v4
              with:
                  repository: aspizu/goboscript
                  ref: e4e97cd2fd336a6b4ad98c67223c5f48359f66da
                  path: goboscript

            - name: Install wasm-pack
              uses: jetli/wasm-pack-action@v0.4.0
              with:
                  version: "latest"

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: nightly
                  rustflags: "-A warnings"

            - name: Build Goboscript WASM
              run: |
                  cd goboscript
                  wasm-pack build --release 2>&1 | grep -v "not a recognized feature"

            - name: Upload Goboscript WASM Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: goboscript-wasm
                  path: goboscript/pkg

    sb2gs-wasm:
        name: Build sb2gs WASM
        runs-on: ubuntu-latest
        steps:
            - name: Checkout sb2gs Repository
              uses: actions/checkout@v4
              with:
                  repository: aspizu/sb2gs
                  ref: f0c780308d8bb8c1365fb4bbd81528bed2779120
                  path: sb2gs

            - name: Install wasm-pack
              uses: jetli/wasm-pack-action@v0.4.0
              with:
                  version: "latest"

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable
                  rustflags: "-A warnings"

            - name: Build sb2gs WASM
              run: |
                  cd sb2gs
                  wasm-pack build crates/wasm --target web --release

            - name: Upload sb2gs WASM Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: sb2gs-wasm
                  path: sb2gs/crates/wasm/pkg

    build:
        name: Build Project
        runs-on: ubuntu-latest
        needs:
            - goboscript-wasm
            - sb2gs-wasm
        steps:
            - name: Checkout Main Repository
              uses: actions/checkout@v4

            - name: Download Goboscript WASM Artifact
              uses: actions/download-artifact@v4
              with:
                  name: goboscript-wasm
                  path: goboscript/pkg

            - name: Download sb2gs WASM Artifact
              uses: actions/download-artifact@v4
              with:
                  name: sb2gs-wasm
                  path: sb2gs/crates/wasm/pkg

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install Dependencies
              run: bun install

            - name: Build Project
              run: bun run build

            - name: Upload Pages Artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  name: github-pages
                  path: ./dist

    deploy:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        needs: build
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deploy
              uses: actions/deploy-pages@v4
